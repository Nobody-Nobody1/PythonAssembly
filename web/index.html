<!DOCTYPE html>
<head>
<meta charset="UTF-8">
<title>Web Code Editor</title>
<style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    textarea { width: 100%; height: 300px; margin-top: 10px; }
    button { margin-top: 10px; padding: 8px 12px; }
</style>
</head>
<body>

<h2>Edit and Execute</h2>

<!-- Text area for editing -->
<textarea id="editor" placeholder="Content will appear here..."></textarea>
<br>

<!-- Execute button -->
<button onclick="RunAndOutput()">Run Code</button>
<p id="output"></p>

<script>
const editor = document.getElementById('editor');

function RunAndOutput() {
            // Get the text box element
            const textBox = document.getElementById("editor");

            // Get the current value
            const value = textBox.value.trim(); // trim removes extra spaces

            // Clear the text box
            textBox.value = "";

            // Print the value (to page and console)
            if (value) {
                document.getElementById("output").textContent = "You entered: " + value;
                console.log("You entered:", value);
            } else {
                document.getElementById("output").textContent = "Text box was empty.";
                console.warn("Text box was empty.");
            }
        }

</script>

</body>
</html>
